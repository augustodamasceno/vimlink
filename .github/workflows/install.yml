name: Install Script

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  syntax-check:
    name: Shell syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check install.sh syntax
        run: bash -n install.sh

  install:
    name: Full install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # Prevent git from hanging on credential prompts in non-interactive CI
      GIT_TERMINAL_PROMPT: 0
      # Skip the expensive YCM cmake build in CI
      SKIP_YCM_BUILD: 1

    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh
        run: bash install.sh

      - name: Verify vimrc installed
        run: test -f "$HOME/.vimrc"

      - name: Verify vim-plug installed
        run: test -f "$HOME/.vim/autoload/plug.vim"

      - name: Verify vim plugins directory exists
        run: test -d "$HOME/.vim/plugged"

      - name: Verify YouCompleteMe built
        run: test -f "$HOME/.vim/plugged/YouCompleteMe/third_party/ycmd/ycm_core.so" ||
             test -f "$HOME/.vim/plugged/YouCompleteMe/third_party/ycmd/ycm_core.cpython"*".so"

      - name: Verify English dictionary installed
        run: test -f "$HOME/.dic/en_US.dic"
